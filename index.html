<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTP RÁDIO WEB</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Montserrat;
    color:#fff;
    overflow-x:hidden;
}

/* FUNDO COM EFEITO 3D */
.bg-flag {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: url("bd.jpg") no-repeat center center;
    background-size: cover;
    z-index:-2;
}





/* ANIMAÇÃO REALISTA */
@keyframes wave {
    0%   { transform: translateX(0) skewY(0deg); }
    25%  { transform: translateX(-5%) skewY(2deg); }
    50%  { transform: translateX(-10%) skewY(0deg); }
    75%  { transform: translateX(-5%) skewY(-2deg); }
    100% { transform: translateX(0) skewY(0deg); }
}

header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:rgba(0,0,0,0.8);
    border-bottom:2px solid red;
}

.logo {
    font-weight:bold;
}

nav a {
    margin-left:15px;
    color:#fff;
    text-decoration:none;
}

.hero {
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:40px;
}

.section {padding:40px 20px;}

.cards {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card {
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:10px;
}

.cta {
    background:rgba(0,0,0,0.8);
    padding:30px;
    text-align:center;
}

.cta a {
    background:red;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:8px;
}

/* WHATSAPP */
.whatsapp-btn {
    position: fixed;
    bottom: 15px;
    right: 15px;
    z-index: 10000;
}

.whatsapp-btn img {
    width: 55px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* PLAYER */
.player-pro {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    text-align: center;
}

#btn {
    margin-top:10px;
    background:#7b2cff;
    padding:14px 35px;
    color:#fff;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="bg-flag"></div>

<header>
<div class="logo">NTP RÁDIO WEB</div>
<nav>
<a href="#">Início</a>
<a href="#">Programas</a>
</nav>
</header>

<section class="hero">
<h1>O SOM QUE NUNCA MORRE 🎸</h1>
</section>

<section class="section">
<h2>🔥 Programação</h2>
<div class="cards">
<div class="card">08h - Despertar Rock</div>
<div class="card">14h - Clássicos Eternos</div>
<div class="card">20h - Rock Legends</div>
<div class="card">00h - Midnight Rock</div>
</div>
</section>

<section class="cta">
<h2>📢 Quer divulgar?</h2>
<a href="https://wa.me/5561991057795" target="_blank">Fale comigo</a>
</section>

<a href="https://wa.me/5561991057795" target="_blank" class="whatsapp-btn">
<img src="https://cdn-icons-png.flaticon.com/512/220/220236.png">
</a>

<div class="player-pro">
<h2>NTP RÁDIO WEB</h2>
<p>🔴 AO VIVO • Classic Rock</p>
<button id="btn">▶️ TOCAR AGORA</button>
</div>

<audio id="radio">
<source src="https://stream.zeno.fm/elhz4znig9wuv" type="audio/mpeg">
</audio>

<script>
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");

btn.onclick = () => {
    if(radio.paused){
        radio.play();
        btn.innerText = "⏸ PARAR";
    } else {
        radio.pause();
        btn.innerText = "▶️ TOCAR AGORA";
    }
}
</script>

</body>
</html>
