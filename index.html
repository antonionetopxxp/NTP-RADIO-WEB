<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTP RÁDIO WEB</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
    background:#0a0a0a;
    color:#fff;
}

/* HEADER PROFISSIONAL */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#000;
    border-bottom:2px solid #7b2cff;
}

.logo{
    font-weight:900;
    font-size:18px;
    color:#fff;
}

nav a{
    margin-left:15px;
    color:#ccc;
    text-decoration:none;
    font-size:14px;
}

/* HERO */
.hero{
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)), url('bd.jpg') center/cover;
}

.hero h1{
    font-size:38px;
    font-weight:900;
}

/* BOTÕES */
.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 22px;
    background:#7b2cff;
    border-radius:6px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

/* SEÇÕES */
.section{
    padding:40px 20px;
    text-align:center;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:10px;
}

/* ANÚNCIO */
.anuncio{
    max-width:500px;
    margin:20px auto;
    position:relative;
}

.anuncio img{
    width:100%;
    border-radius:10px;
}

.anuncio span{
    position:absolute;
    bottom:8px;
    left:50%;
    transform:translateX(-50%);
    background:#7b2cff;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

/* PLAYER PROFISSIONAL */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    border-top:2px solid #7b2cff;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.live{
    color:#ff2d2d;
    font-weight:bold;
}

#btnPlayer{
    background:#7b2cff;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    color:#fff;
    font-weight:bold;
}

/* FLOAT */
.float{
    position:fixed;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.whatsapp{bottom:90px;}
.instagram{bottom:150px;}

.float img{
    width:45px;
    border-radius:50%;
}
</style>
</head>

<body>

<header>
<div class="logo">NTP RÁDIO WEB</div>
<nav>
<a href="#">Início</a>
<a href="#">Programação</a>
</nav>
</header>

<section class="hero">
<div>
<h1>O SOM QUE NUNCA MORRE 🎸</h1>
<a href="#" class="btn">OUVIR AGORA</a>
</div>
</section>

<section class="section">
<h2>🔥 Programação</h2>
<div class="cards">
<div class="card">08h - Despertar Rock</div>
<div class="card">14h - Clássicos</div>
<div class="card">20h - Rock Legends</div>
</div>
</section>

<section class="section">
<h2>📢 Anuncie</h2>

<div class="anuncio">
<img src="a_wide_horizontal_marketing_banner_digital_adver.png">
<span>📲 Chame no Zap</span>
</div>

<a href="https://wa.me/61991057795" class="btn">Quero Anunciar</a>
</section>

<div class="player">
<div>
<span class="live">● AO VIVO</span> NTP RÁDIO WEB
</div>
<button id="btnPlayer">▶ TOCAR</button>
</div>

<div class="float whatsapp">
<a href="#"><img src="https://cdn-icons-png.flaticon.com/512/220/220236.png"></a>
</div>

<div class="float instagram">
<a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
</div>

</body>
</html>
