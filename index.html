<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTP RÁDIO WEB</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat',sans-serif;
}

body{
    color:#fff;
    background:url('bd.jpg') no-repeat center center fixed;
    background-size:cover;
}

/* overlay escuro */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    z-index:-1;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#000;
    border-bottom:2px solid #7b2cff;
}

.logo{
    font-size:22px;
    font-weight:900;
    color:#fff;
}

nav a{
    margin-left:15px;
    color:#fff;
    text-decoration:none;
}

/* HERO */
.hero{
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fadeIn 2s ease;
}

.hero h1{
    font-size:42px;
    text-shadow:0 0 20px #7b2cff;
}

/* VIDEOS */
.videos{
    padding:40px 20px;
}

.videos h2{
    margin-bottom:20px;
    text-align:center;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.video iframe{
    width:100%;
    height:200px;
    border-radius:10px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    padding:15px;
    text-align:center;
    border-top:2px solid #7b2cff;
}

#btn{
    margin-top:10px;
    background:#7b2cff;
    padding:12px 30px;
    border:none;
    color:#fff;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* BOTÕES FLUTUANTES */
.float{
    position:fixed;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

.whatsapp{
    bottom:80px;
}

.instagram{
    bottom:150px;
}

.float img{
    width:55px;
    border-radius:50%;
    box-shadow:0 0 10px #000;
    animation:pulse 1.5s infinite;
}

/* animações */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<header>
<div class="logo">📻 NTP RÁDIO WEB</div>
<nav>
<a href="#">Início</a>
<a href="#videos">Vídeos</a>
</nav>
</header>

<section class="hero">
<h1>🔥 O SOM QUE NUNCA PARA 🔥</h1>
</section>

<section class="videos" id="videos">
<h2>🎥 Transmissões & Conteúdos</h2>

<div class="video-grid">

<div class="video">
<iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
</div>

<div class="video">
<iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
</div>

<div class="video">
<iframe src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
</div>

</div>
</section>

<!-- PLAYER -->
<div class="player">
<h3>🔴 AO VIVO • NTP RÁDIO WEB</h3>
<button id="btn">▶️ TOCAR AGORA</button>
</div>

<audio id="radio">
<source src="https://stream.zeno.fm/elhz4znig9wuv" type="audio/mpeg">
</audio>

<!-- BOTÕES -->
<div class="float whatsapp">
<a href="https://wa.me/5561991057795" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/220/220236.png">
</a>
</div>

<div class="float instagram">
<a href="https://instagram.com/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>
</div>

<script>
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");

btn.addEventListener("click", () => {
    if(radio.paused){
        radio.play();
        btn.innerText = "⏸ PARAR";
    } else {
        radio.pause();
        btn.innerText = "▶️ TOCAR AGORA";
    }
});
</script>

</body>
</html>
