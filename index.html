<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTP RÁDIO WEB</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:Montserrat;background:#0a0a0a;color:#fff;}
header {display:flex;justify-content:space-between;padding:15px;background:#000;border-bottom:2px solid red;}
.logo {color:red;font-weight:bold;}
nav a {margin-left:15px;color:#fff;text-decoration:none;}

.hero {
height:60vh;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f') center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1 {font-size:40px;}

.section {padding:40px 20px;}

.cards {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card {
background:#1a1a1a;
padding:20px;
border-radius:10px;
}

.cta {
background:#111;
padding:30px;
text-align:center;
}

.cta a {
background:red;
color:white;
padding:10px 20px;
text-decoration:none;
}

.whatsapp-btn {
    position: fixed;
    bottom: 15px; /* colado no final da tela */
    right: 15px; /* lado direito */
    z-index: 10000;
}

.whatsapp-btn img {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.whatsapp-btn img {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}
    
.player-pro {
.player-pro .info {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
}

#btn {
    display: inline-block;
    margin-top: 10px;
    background: red;
    padding: 14px 35px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    border-radius: 10px;
}
{
    padding-bottom: 160px;
}

</style>
</head>

<body>

<header>
<div class="logo">NTP RÁDIO WEB</div>
<nav>
<a href="#">Início</a>
<a href="#">Programas</a>
<a href="https://wa.me/61991057795" target="_blank" class="whatsapp-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/220/220236.png" alt="WhatsApp">
</a>
</nav>
</header>

<section class="hero">
<h1>O SOM QUE NUNCA MORRE 🎸</h1>
</section>

<section class="section">
<h2>🔥 Programação</h2>
<div class="cards">
<div class="card">08h - Despertar Rock</div>
<div class="card">14h - Clássicos Eternos</div>
<div class="card">20h - Rock Legends</div>
<div class="card">00h - Midnight Rock</div>
</div>
</section>

<section class="cta">
<h2>📢 Quer divulgar sua marca ou música?</h2>
<a href="https://wa.me/SEUNUMERO" target="_blank">Fale comigo agora</a>
</section>

<a href="https://wa.me/SEUNUMERO" target="_blank" class="whatsapp">📲</a>

<!-- PLAYER ZENO FIXO -->
<div class="player-pro">

    <img src="banner.png" class="bg">

    <div class="info">
        <h2>NTP RÁDIO WEB</h2>
        <p>🔴 AO VIVO • Classic Rock 24h</p>

        <button id="btn">▶️ TOCAR AGORA</button>
    </div>

</div>

<audio id="radio" preload="none" playsinline>
    <source src="https://stream.zeno.fm/elhz4znig9wuv" type="audio/mpeg">
</audio>
<script>
document.addEventListener("DOMContentLoaded", function(){

    const radio = document.getElementById("radio");
    const btn = document.getElementById("btn");

    btn.addEventListener("click", function(){

        if(radio.paused){
            radio.play();
            btn.innerText = "⏸ PARAR";
        } else {
            radio.pause();
            btn.innerText = "▶️ TOCAR AGORA";
        }

    });

});
</script>
</body>
</html>
