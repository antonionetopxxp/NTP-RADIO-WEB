    <style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
    background:#0a0a0a;
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#000;
    border-bottom:2px solid #7b2cff;
}

.logo{font-weight:900;font-size:18px;}

nav a{
    margin-left:15px;
    color:#ccc;
    text-decoration:none;
}

/* HERO */
.hero{
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)), url('bd.jpg') center/cover;
}

.hero h1{
    font-size:38px;
    font-weight:900;
}

/* BOTÃO */
.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 22px;
    background:#7b2cff;
    border-radius:6px;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}

/* SEÇÕES */
.section{
    padding:40px 20px;
    text-align:center;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:10px;
}

/* ANÚNCIO */
.anuncio{
    max-width:500px;
    margin:20px auto;
    position:relative;
    overflow:hidden;
}

/* IMAGEM COM MOVIMENTO */
.anuncio img{
    width:100%;
    border-radius:10px;
    animation: floatZoom 6s ease-in-out infinite;
}

/* BRILHO PASSANDO */
.anuncio::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: brilho 3s infinite;
}

/* BOTÃO DO ANÚNCIO */
.anuncio span{
    position:absolute;
    bottom:8px;
    left:50%;
    transform:translateX(-50%);
    background:#7b2cff;
    padding:5px 10px;
    border-radius:5px;
    font-size:12px;
}

/* ANIMAÇÕES */
@keyframes floatZoom{
    0%{transform:translateY(0px) scale(1);}
    50%{transform:translateY(-8px) scale(1.05);}
    100%{transform:translateY(0px) scale(1);}
}

@keyframes brilho{
    0%{left:-100%;}
    100%{left:100%;}
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    border-top:2px solid #7b2cff;
    padding:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:999;
}

.live{
    color:#ff2d2d;
    font-weight:bold;
}

.music{
    font-size:13px;
    margin-top:5px;
    color:#ccc;
}

#btnPlayer{
    margin-top:8px;
    background:#7b2cff;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    color:#fff;
    font-weight:bold;
}

/* FLOAT */
.float{
    position:fixed;
    right:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:1000;
}

/* SUBIDOS ACIMA DO PLAYER */
.whatsapp{bottom:140px;}
.instagram{bottom:200px;}

.float img{
    width:45px;
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

/* ANIMAÇÃO BOTÕES */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}
    .zap-btn{
    position:absolute;
    bottom:8px;
    left:31%;
    transform:translateX(-50%);
    background:#7b2cff;
    padding:6px 12px;
    border-radius:6px;
    font-size:12px;
    color:#fff;
    text-decoration:none;
    animation:pulse 1.5s infinite;
}
</style>
</head>

<body>

<header>

<div class="card">20h - Rock Legends</div>

<section class="section">
<h2>📢 Anuncie</h2>

<div class="anuncio">

<img src="a_wide_horizontal_marketing_banner_digital_adver.png">

🔥 Promoção exclusiva — clique e fale direto no WhatsApp

<a href="https://wa.me/5591999999999?text=Ol%C3%A1%2C%20vi%20seu%20an%C3%BAncio%20na%20NTP%20R%C3%A1dio%20Web%20%F0%9F%94%A5%20e%20tenho%20interesse.%20Pode%20me%20passar%20mais%20informa%C3%A7%C3%B5es%3F" 
target="_blank" 
class="zap-btn">
📲 Chame no Zap
</a>

</div>

<a href="https://wa.me/61991057795" class="btn">Quero Anunciar</a>

<!-- PLAYER -->
<div class="player">
<div>
<span class="live">● AO VIVO</span> NTP RÁDIO WEB
</div>

<button id="btnPlayer">▶ TOCAR</button>

<div class="float whatsapp">

</a>

<script>
const radio = document.getElementById("radio");
const btn = document.getElementById("btnPlayer");
const music = document.getElementById("music");

btn.onclick = () => {
    if(radio.paused){
        radio.play();
        btn.innerText = "⏸ PARAR";
    } else {
        radio.pause();
        btn.innerText = "▶ TOCAR";
    }
};

async function getMusic(){
    try{
        const res = await fetch("https://api.zeno.fm/mounts/metadata/subscribe/elhz4znig9wuv");
        const text = await res.text();
        const match = text.match(/StreamTitle='(.*?)';/);
        if(match && match[1]){
            music.innerText = "🎵 " + match[1];
        } else {
            music.innerText = "🎵 AO VIVO";
        }
    }catch{
        music.innerText = "🎵 AO VIVO";
    }
}

setInterval(getMusic, 10000);
getMusic();
</script>
